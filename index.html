<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能文件系统 - 数据可视化面板</title>
    
    <!-- 引入 PapaParse 解析 CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <!-- 引入 Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

    <style>
        :root {
            --bg-color: #0f0c29;
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-color: #f3f4f6;
            
            --hot-color: #ef4444;
            --warm-color: #f59e0b;
            --cold-color: #3b82f6;
            --none-color: #9ca3af;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
        }

        /* ----- 登录页样式 ----- */
        #login-view {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .login-card h2 {
            margin-top: 0;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .login-card p {
            font-size: 0.875rem;
            color: #9ca3af;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.875rem;
            color: #d1d5db;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #4b5563;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            color: #fff;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #ef4444;
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #ef4444, #dc2626);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .login-tips {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #6b7280;
        }

        /* ----- DashBoard 样式 ----- */
        #dashboard-view {
            display: none;
            padding: 24px;
            max-width: 1600px;
            margin: 0 auto;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-info span {
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--card-border);
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 0.875rem;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 24px;
        }

        .module {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
        }

        .module-a {
            grid-column: 1 / 3;
        }

        .module h3 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.125rem;
            color: #f3f4f6;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Accordion 样式 */
        .accordion {
            display: flex;
            gap: 16px;
        }
        
        @media (max-width: 1024px) {
            .grid-container { grid-template-columns: 1fr; }
            .module-a { grid-column: 1 / 2; }
            .accordion { flex-direction: column; }
        }

        .accordion-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        details {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        summary {
            padding: 12px 16px;
            cursor: pointer;
            font-weight: 600;
            outline: none;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
        }

        summary:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        details[open] {
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* 动画控制的包裹层 */
        .content-wrapper {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-out;
        }

        .content-wrapper.is-open {
            grid-template-rows: 1fr;
        }

        .details-content {
            overflow: hidden;
        }

        .scroll-area {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            max-height: 300px;
            overflow-y: auto;
            padding: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        th, td {
            text-align: left;
            padding: 10px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            background: rgba(0, 0, 0, 0.3);
            color: #9ca3af;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .empty-state {
            padding: 20px;
            text-align: center;
            color: #6b7280;
            font-size: 0.875rem;
        }

        /* 图表容器 */
        .chart-container {
            width: 100%;
            height: 400px;
            position: relative;
        }
        
            /* Modebar 暗色主题 */
        .modebar{background:rgba(15,12,41,.85)!important;backdrop-filter:blur(8px);border-radius:8px;border:1px solid rgba(255,255,255,.08);z-index:15}
        .modebar-btn{fill:#d1d5db!important;color:#d1d5db!important;opacity:1!important}
        .modebar-btn svg,.modebar-btn path{fill:inherit!important}
        .modebar-btn:hover{fill:#fff!important;color:#fff!important}
        .modebar-container{top:8px!important;right:8px!important}</style>
</head>
<body>

    <!-- 登录页面 -->
    <div id="login-view">
        <div class="login-card">
            <h2>💽 智能文件系统</h2>
            <p>基于 K-means 的 FAT 模拟面板</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="username">👤 用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="password">🔑 密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn">🚀 登 录</button>
            </form>
            
            <div class="login-tips">
                默认账号: user/123456 &nbsp;|&nbsp; root/admin &nbsp;|&nbsp; caiyuchen/20051002
            </div>
        </div>
    </div>

    <!-- 仪表盘页面 -->
    <div id="dashboard-view">
        <div class="header">
            <h1>💽 智能文件系统结果展示</h1>
            <div class="user-info">
                当前登录: <span id="current-user"></span>
                <button class="logout-btn" id="logout-btn">🚪 退出登录</button>
            </div>
        </div>

        <div class="grid-container">
            <!-- 模块 A: 分类结果折叠面板 -->
            <div class="module module-a">
                <h3>📄 模块 A: 文件分类聚类明细 (FCB 快照)</h3>
                <div class="accordion" id="accordion-container">
                    <!-- JS 动态填入 -->
                </div>
            </div>

            <!-- 模块 B: K-means 聚类散点图 -->
            <div class="module">
                <h3>🧠 模块 B: 数据访问频次 K-means 聚类</h3>
                <div class="chart-container" id="scatter-container"></div>
            </div>

            <!-- 模块 C: 物理磁盘分配图 -->
            <div class="module">
                <h3>🧱 模块 C: 物理磁盘簇分配全景</h3>
                <div class="chart-container" id="treemap-container"></div>
            </div>
        </div>
    </div>

    <script>
        // --- 核心配置 ---
        const CLUSTER_CONFIG = {
            '2':  { label: '热数据 (Hot)', color: '#ef4444' },
            '1':  { label: '温数据 (Warm)', color: '#f59e0b' },
            '0':  { label: '冷数据 (Cold)', color: '#3b82f6' },
            '-1': { label: '未分析',       color: '#9ca3af' }
        };

        // --- DOM 元素引用 ---
        const loginView = document.getElementById('login-view');
        const dashboardView = document.getElementById('dashboard-view');
        const loginForm = document.getElementById('login-form');
        const logoutBtn = document.getElementById('logout-btn');
        const currentUserSpan = document.getElementById('current-user');

        // --- 登录逻辑 ---
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();

            const isValid = 
                (u === 'user' && p === '123456') ||
                (u === 'root' && p === 'admin') ||
                (u === 'caiyuchen' && p === '20051002');

            if (isValid) {
                // 切换视图
                loginView.style.display = 'none';
                dashboardView.style.display = 'block';
                currentUserSpan.textContent = u;
                
                // 加载数据并渲染
                loadCsvData();
            } else {
                alert('❌ 账号或密码错误！\n可用账号: \n- user (123456)\n- root (admin)\n- caiyuchen (20051002)');
            }
        });

        // --- 登出逻辑 ---
        logoutBtn.addEventListener('click', () => {
            dashboardView.style.display = 'none';
            loginView.style.display = 'flex';
            document.getElementById('password').value = '';
        });

        // --- 数据加载与解析 ---
        function loadCsvData() {
            // 在同级目录下寻找 result.csv。在 Web server、Live Server 下均适用
            Papa.parse('./result.csv', {
                download: true,
                header: true,
                dynamicTyping: true,
                skipEmptyLines: true,
                complete: function(results) {
                    if (results.errors.length && results.data.length === 0) {
                        alert('读取 result.csv 失败，请确保该文件与 html 处于同一目录下！\n注意：双击本地HTML文件如果受 CORS 限制，请使用 Live Server 运行。');
                        return;
                    }
                    const data = results.data.filter(d => d.filename);
                    if (data.length === 0) {
                        alert('result.csv 无数据！');
                        return;
                    }
                    
                    renderModuleA(data);
                    renderModuleB(data);
                    renderModuleC(data);
                    
                    // 触发布局重绘，防止 plotly 计算容器出错
                    window.dispatchEvent(new Event('resize'));
                },
                error: function(err) {
                    alert('获取 result.csv 失败，请确认文件路径或检查 CORS 策略。');
                }
            });
        }

        // --- 渲染模块 A (折叠面板) ---
        function renderModuleA(data) {
            const container = document.getElementById('accordion-container');
            container.innerHTML = '';
            
            // 按冷热分离开
            const groups = { '2': [], '1': [], '0': [], '-1': [] };
            data.forEach(item => {
                const cid = String(item.cluster_id);
                if (groups[cid]) {
                    groups[cid].push(item);
                }
            });

            const order = ['2', '1', '0', '-1'];
            
            // 创建两列，热温在一列，冷未分析在另一列
            const col1 = document.createElement('div');
            col1.className = 'accordion-column';
            const col2 = document.createElement('div');
            col2.className = 'accordion-column';

            order.forEach((c, index) => {
                const items = groups[c];
                const cfg = CLUSTER_CONFIG[c];
                
                const details = document.createElement('details');
                // 默认展开热数据
                if (c === '2') details.open = true;

                const summary = document.createElement('summary');
                summary.innerHTML = `<span style="color: ${cfg.color}; font-size: 1.2rem;">●</span> ${cfg.label} (${items.length})`;
                details.appendChild(summary);

                const wrapper = document.createElement('div');
                wrapper.className = 'content-wrapper';
                // 如果是默认展开项，加上 is-open 触发完全展示
                if (c === '2') {
                    wrapper.classList.add('is-open');
                }

                const content = document.createElement('div');
                content.className = 'details-content';

                let innerHtml = `<div class="scroll-area">`;
                
                if (items.length > 0) {
                    innerHtml += `<table>
                        <thead>
                            <tr>
                                <th>文件名</th>
                                <th>大小(B)</th>
                                <th>读频次</th>
                                <th>写频次</th>
                            </tr>
                        </thead>
                        <tbody>`;
                    
                    items.forEach(d => {
                        innerHtml += `<tr>
                            <td>${d.filename}</td>
                            <td>${d.length}</td>
                            <td>${d.read_count}</td>
                            <td>${d.write_count}</td>
                        </tr>`;
                    });
                    innerHtml += `</tbody></table>`;
                } else {
                    innerHtml += `<div class="empty-state">该分类下暂无文件</div>`;
                }

                innerHtml += `</div>`;
                content.innerHTML = innerHtml;

                wrapper.appendChild(content);
                details.appendChild(wrapper);

                // 劫持点击事件以平滑动画
                summary.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (details.open) {
                        wrapper.classList.remove('is-open');
                        // 等待收起动画完成再移除 open 属性
                        setTimeout(() => {
                            details.open = false;
                        }, 300);
                    } else {
                        details.open = true;
                        // 确保 DOM 更新完毕再添加 is-open 类从而触发动画
                        requestAnimationFrame(() => {
                            wrapper.classList.add('is-open');
                        });
                    }
                });

                // 分配到列
                if (index < 2) col1.appendChild(details);
                else col2.appendChild(details);
            });

            container.appendChild(col1);
            container.appendChild(col2);
        }

        // --- 渲染模块 B (散点图) ---
        function renderModuleB(data) {
            const trace = {
                x: data.map(d => d.read_count),
                y: data.map(d => d.write_count),
                text: data.map(d => d.filename),
                mode: 'markers',
                marker: {
                    // 使用气泡大小表示文件长度，设定基于开方的缩放比例以保持美观
                    size: data.map(d => Math.max(Math.sqrt(d.length) * 0.5, 6)),
                    sizemode: 'diameter',
                    color: data.map(d => CLUSTER_CONFIG[String(d.cluster_id)].color),
                    opacity: 0.85,
                    line: { width: 1, color: 'rgba(255,255,255,0.4)' }
                },
                hovertemplate: '<b>%{text}</b><br>读频次: %{x}<br>写频次: %{y}<extra></extra>'
            };

            const layout = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                font: { color: '#d1d5db' },
                margin: { l: 50, r: 20, t: 48, b: 50 },
                xaxis: { 
                    title: '读取频次', 
                    gridcolor: 'rgba(255,255,255,0.08)',
                    zerolinecolor: 'rgba(255,255,255,0.2)'
                },
                yaxis: { 
                    title: '写入频次', 
                    gridcolor: 'rgba(255,255,255,0.08)',
                    zerolinecolor: 'rgba(255,255,255,0.2)'
                },
                hovermode: 'closest'
            };

            const config = {
                displayModeBar: true,   // 强制开启工具栏
                responsive: true,
                displaylogo: false
            };

            Plotly.newPlot('scatter-container', [trace], layout, config);
        }

        // --- 渲染模块 C (Treemap) ---
        function renderModuleC(data) {
            const rootName = '模拟磁盘 512KB';
            
            // Plotly Treemap 要求所有节点有唯一的 id
            // 这里构建：根节点 -> 类别节点 -> 文件节点
            const ids = [rootName];
            const labels = [rootName];
            const parents = [''];
            const values = [0]; // Plotly 处理 remainder 或不设 branchvalues 时会自动累加子节点
            const colors = ['#1f2937']; // 根节点颜色

            const order = ['2', '1', '0', '-1'];
            
            // 添加第1层类别
            order.forEach(c => {
                ids.push('cat_' + c);
                labels.push(CLUSTER_CONFIG[c].label);
                parents.push(rootName);
                values.push(0);
                colors.push(CLUSTER_CONFIG[c].color);
            });

            // 添加第2层文件，由于可能有同名文件，我们通过附加前缀确保 ID 唯一
            data.forEach((d, i) => {
                const uniqueId = `file_${i}_${d.filename}`;
                ids.push(uniqueId);
                labels.push(d.filename);
                parents.push('cat_' + String(d.cluster_id));
                values.push(d.length || 1);  // 避免 0 尺寸
                colors.push(CLUSTER_CONFIG[String(d.cluster_id)].color);
            });

            const trace = {
                type: 'treemap',
                ids: ids,
                labels: labels,
                parents: parents,
                values: values,
                marker: { 
                    colors: colors,
                },
                textinfo: 'label+value',
                hovertemplate: '<b>%{label}</b><br>大小占比: %{value}<extra></extra>',
                pathbar: { visible: true },
                rootcolor: 'transparent'
            };

            const layout = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                margin: { l: 0, r: 0, t: 40, b: 0 },
                font: { color: '#fff' }
            };

            const config = {
                displayModeBar: true, 
                responsive: true,
                displaylogo: false
            };

            Plotly.newPlot('treemap-container', [trace], layout, config);
        }
    </script>
</body>
</html>
